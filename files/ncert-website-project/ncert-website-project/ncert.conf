# NCERT website - Nginx server block
# Save this file as: /etc/nginx/sites-available/ncert.conf
# Then enable it and reload nginx (see SETUP_GUIDE.docx for full steps)

server {
    listen 8080;
    listen [::]:8080;

    server_name localhost;

    root /var/www/ncert-website;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Basic cache headers for static assets
    location ~* \.(css|js|svg)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    access_log /var/log/nginx/ncert.access.log;
    error_log  /var/log/nginx/ncert.error.log;
}
